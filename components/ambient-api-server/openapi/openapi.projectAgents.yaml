paths:
  /api/ambient/v1/projects/{id}/agents:
    get:
      summary: Returns a list of agents in a project
      security:
        - Bearer: []
      responses:
        '200':
          description: A JSON array of agent objects
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProjectAgentList'
        '401':
          description: Auth token is invalid
          content:
            application/json:
              schema:
                $ref: 'openapi.yaml#/components/schemas/Error'
        '403':
          description: Unauthorized to perform operation
          content:
            application/json:
              schema:
                $ref: 'openapi.yaml#/components/schemas/Error'
        '404':
          description: No project with specified id exists
          content:
            application/json:
              schema:
                $ref: 'openapi.yaml#/components/schemas/Error'
        '500':
          description: Unexpected error occurred
          content:
            application/json:
              schema:
                $ref: 'openapi.yaml#/components/schemas/Error'
      parameters:
        - $ref: '#/components/parameters/page'
        - $ref: '#/components/parameters/size'
        - $ref: '#/components/parameters/search'
        - $ref: '#/components/parameters/orderBy'
        - $ref: '#/components/parameters/fields'
    post:
      summary: Create an agent in a project
      security:
        - Bearer: []
      requestBody:
        description: Agent data
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ProjectAgent'
      responses:
        '201':
          description: Created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProjectAgent'
        '400':
          description: Validation errors occurred
          content:
            application/json:
              schema:
                $ref: 'openapi.yaml#/components/schemas/Error'
        '401':
          description: Auth token is invalid
          content:
            application/json:
              schema:
                $ref: 'openapi.yaml#/components/schemas/Error'
        '403':
          description: Unauthorized to perform operation
          content:
            application/json:
              schema:
                $ref: 'openapi.yaml#/components/schemas/Error'
        '404':
          description: No project with specified id exists
          content:
            application/json:
              schema:
                $ref: 'openapi.yaml#/components/schemas/Error'
        '409':
          description: Agent already exists in this project
          content:
            application/json:
              schema:
                $ref: 'openapi.yaml#/components/schemas/Error'
        '500':
          description: An unexpected error occurred creating the agent
          content:
            application/json:
              schema:
                $ref: 'openapi.yaml#/components/schemas/Error'
    parameters:
      - $ref: '#/components/parameters/id'
  /api/ambient/v1/projects/{id}/agents/{pa_id}:
    get:
      summary: Get an agent by id
      security:
        - Bearer: []
      responses:
        '200':
          description: Agent found by id
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProjectAgent'
        '401':
          description: Auth token is invalid
          content:
            application/json:
              schema:
                $ref: 'openapi.yaml#/components/schemas/Error'
        '403':
          description: Unauthorized to perform operation
          content:
            application/json:
              schema:
                $ref: 'openapi.yaml#/components/schemas/Error'
        '404':
          description: No agent with specified id exists
          content:
            application/json:
              schema:
                $ref: 'openapi.yaml#/components/schemas/Error'
        '500':
          description: Unexpected error occurred
          content:
            application/json:
              schema:
                $ref: 'openapi.yaml#/components/schemas/Error'
    patch:
      summary: Update an agent (name, prompt, labels, annotations)
      security:
        - Bearer: []
      requestBody:
        description: Updated agent data
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ProjectAgentPatchRequest'
      responses:
        '200':
          description: Agent updated successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProjectAgent'
        '400':
          description: Validation errors occurred
          content:
            application/json:
              schema:
                $ref: 'openapi.yaml#/components/schemas/Error'
        '401':
          description: Auth token is invalid
          content:
            application/json:
              schema:
                $ref: 'openapi.yaml#/components/schemas/Error'
        '403':
          description: Unauthorized to perform operation
          content:
            application/json:
              schema:
                $ref: 'openapi.yaml#/components/schemas/Error'
        '404':
          description: No agent with specified id exists
          content:
            application/json:
              schema:
                $ref: 'openapi.yaml#/components/schemas/Error'
        '500':
          description: Unexpected error updating agent
          content:
            application/json:
              schema:
                $ref: 'openapi.yaml#/components/schemas/Error'
    delete:
      summary: Delete an agent from a project
      security:
        - Bearer: []
      responses:
        '204':
          description: Agent deleted successfully
        '401':
          description: Auth token is invalid
          content:
            application/json:
              schema:
                $ref: 'openapi.yaml#/components/schemas/Error'
        '403':
          description: Unauthorized to perform operation
          content:
            application/json:
              schema:
                $ref: 'openapi.yaml#/components/schemas/Error'
        '404':
          description: No agent with specified id exists
          content:
            application/json:
              schema:
                $ref: 'openapi.yaml#/components/schemas/Error'
        '500':
          description: Unexpected error occurred
          content:
            application/json:
              schema:
                $ref: 'openapi.yaml#/components/schemas/Error'
    parameters:
      - $ref: '#/components/parameters/id'
      - name: pa_id
        in: path
        description: The id of the agent
        required: true
        schema:
          type: string
  /api/ambient/v1/projects/{id}/agents/{pa_id}/ignite:
    post:
      summary: Ignite an agent — creates a Session (idempotent)
      description: |
        Creates a new Session for this Agent and drains the inbox into the ignition context.
        If an active session already exists, it is returned as-is.
        Unread Inbox messages are marked read and injected as context before the first turn.
      security:
        - Bearer: []
      requestBody:
        description: Optional ignition parameters
        required: false
        content:
          application/json:
            schema:
              $ref: 'openapi.yaml#/components/schemas/IgniteRequest'
      responses:
        '200':
          description: Session already active — returned as-is
          content:
            application/json:
              schema:
                $ref: 'openapi.yaml#/components/schemas/IgniteResponse'
        '201':
          description: New session created and ignited
          content:
            application/json:
              schema:
                $ref: 'openapi.yaml#/components/schemas/IgniteResponse'
        '401':
          description: Auth token is invalid
          content:
            application/json:
              schema:
                $ref: 'openapi.yaml#/components/schemas/Error'
        '403':
          description: Unauthorized to perform operation
          content:
            application/json:
              schema:
                $ref: 'openapi.yaml#/components/schemas/Error'
        '404':
          description: No agent with specified id exists
          content:
            application/json:
              schema:
                $ref: 'openapi.yaml#/components/schemas/Error'
        '500':
          description: Unexpected error occurred
          content:
            application/json:
              schema:
                $ref: 'openapi.yaml#/components/schemas/Error'
    parameters:
      - $ref: '#/components/parameters/id'
      - name: pa_id
        in: path
        description: The id of the agent
        required: true
        schema:
          type: string
  /api/ambient/v1/projects/{id}/agents/{pa_id}/ignition:
    get:
      summary: Preview ignition context (dry run — no session created)
      security:
        - Bearer: []
      responses:
        '200':
          description: Ignition context preview
          content:
            application/json:
              schema:
                $ref: 'openapi.yaml#/components/schemas/IgniteResponse'
        '401':
          description: Auth token is invalid
          content:
            application/json:
              schema:
                $ref: 'openapi.yaml#/components/schemas/Error'
        '403':
          description: Unauthorized to perform operation
          content:
            application/json:
              schema:
                $ref: 'openapi.yaml#/components/schemas/Error'
        '404':
          description: No agent with specified id exists
          content:
            application/json:
              schema:
                $ref: 'openapi.yaml#/components/schemas/Error'
        '500':
          description: Unexpected error occurred
          content:
            application/json:
              schema:
                $ref: 'openapi.yaml#/components/schemas/Error'
    parameters:
      - $ref: '#/components/parameters/id'
      - name: pa_id
        in: path
        description: The id of the agent
        required: true
        schema:
          type: string
  /api/ambient/v1/projects/{id}/agents/{pa_id}/sessions:
    get:
      summary: Get session run history for an agent
      security:
        - Bearer: []
      responses:
        '200':
          description: Session run history
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProjectAgentSessionList'
        '401':
          description: Auth token is invalid
          content:
            application/json:
              schema:
                $ref: 'openapi.yaml#/components/schemas/Error'
        '403':
          description: Unauthorized to perform operation
          content:
            application/json:
              schema:
                $ref: 'openapi.yaml#/components/schemas/Error'
        '404':
          description: No agent with specified id exists
          content:
            application/json:
              schema:
                $ref: 'openapi.yaml#/components/schemas/Error'
        '500':
          description: Unexpected error occurred
          content:
            application/json:
              schema:
                $ref: 'openapi.yaml#/components/schemas/Error'
      parameters:
        - $ref: '#/components/parameters/page'
        - $ref: '#/components/parameters/size'
    parameters:
      - $ref: '#/components/parameters/id'
      - name: pa_id
        in: path
        description: The id of the agent
        required: true
        schema:
          type: string
  /api/ambient/v1/projects/{id}/home:
    get:
      summary: Project home — latest status for every Agent in this project
      security:
        - Bearer: []
      responses:
        '200':
          description: Project home dashboard payload
          content:
            application/json:
              schema:
                $ref: 'openapi.yaml#/components/schemas/ProjectHome'
        '401':
          description: Auth token is invalid
          content:
            application/json:
              schema:
                $ref: 'openapi.yaml#/components/schemas/Error'
        '403':
          description: Unauthorized to perform operation
          content:
            application/json:
              schema:
                $ref: 'openapi.yaml#/components/schemas/Error'
        '404':
          description: No project with specified id exists
          content:
            application/json:
              schema:
                $ref: 'openapi.yaml#/components/schemas/Error'
        '500':
          description: Unexpected error occurred
          content:
            application/json:
              schema:
                $ref: 'openapi.yaml#/components/schemas/Error'
    parameters:
      - $ref: '#/components/parameters/id'
components:
  schemas:
    ProjectAgent:
      allOf:
        - $ref: 'openapi.yaml#/components/schemas/ObjectReference'
        - type: object
          required:
            - project_id
            - name
          properties:
            project_id:
              type: string
              description: The project this agent belongs to
            name:
              type: string
              description: Human-readable identifier; unique within the project
            prompt:
              type: string
              description: Defines who this agent is. Mutable via PATCH. Access controlled by RBAC.
            current_session_id:
              type: string
              readOnly: true
              description: Denormalized for fast reads — the active session, if any
            labels:
              type: string
            annotations:
              type: string
            created_at:
              type: string
              format: date-time
            updated_at:
              type: string
              format: date-time
    ProjectAgentList:
      allOf:
        - $ref: 'openapi.yaml#/components/schemas/List'
        - type: object
          properties:
            items:
              type: array
              items:
                $ref: '#/components/schemas/ProjectAgent'
    ProjectAgentPatchRequest:
      type: object
      properties:
        name:
          type: string
        prompt:
          type: string
          description: Update agent prompt (access controlled by RBAC)
        labels:
          type: string
        annotations:
          type: string
    ProjectAgentSessionList:
      allOf:
        - $ref: 'openapi.yaml#/components/schemas/List'
        - type: object
          properties:
            items:
              type: array
              items:
                $ref: 'openapi.sessions.yaml#/components/schemas/Session'
  parameters:
    id:
      name: id
      in: path
      description: The id of the project
      required: true
      schema:
        type: string
    page:
      name: page
      in: query
      description: Page number of record list when record list exceeds specified page size
      schema:
        type: integer
        default: 1
        minimum: 1
      required: false
    size:
      name: size
      in: query
      description: Maximum number of records to return
      schema:
        type: integer
        default: 100
        minimum: 0
      required: false
    search:
      name: search
      in: query
      required: false
      description: Specifies the search criteria
      schema:
        type: string
    orderBy:
      name: orderBy
      in: query
      required: false
      description: Specifies the order by criteria
      schema:
        type: string
    fields:
      name: fields
      in: query
      required: false
      description: Supplies a comma-separated list of fields to be returned
      schema:
        type: string
