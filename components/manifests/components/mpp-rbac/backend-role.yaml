apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: backend-api
rules:
# AgenticSessions (backend is sole writer)
- apiGroups: ["vteam.ambient-code"]
  resources: ["agenticsessions"]
  verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
- apiGroups: ["vteam.ambient-code"]
  resources: ["agenticsessions/status"]
  verbs: ["get", "update", "patch"]
# ServiceAccounts (create per-session SA; patch access-key SAs)
- apiGroups: [""]
  resources: ["serviceaccounts"]
  verbs: ["get", "list", "create", "update", "patch"]
# TokenRequests for SA JWT mint
- apiGroups: [""]
  resources: ["serviceaccounts/token"]
  verbs: ["create"]
# RBAC objects for per-session Role/RoleBinding
- apiGroups: ["rbac.authorization.k8s.io"]
  resources: ["roles", "rolebindings"]
  verbs: ["get", "list", "create", "update", "patch", "delete"]
# Secrets (per-session BOT_TOKEN)
- apiGroups: [""]
  resources: ["secrets"]
  verbs: ["get", "list", "create", "update", "patch", "delete"]
# ConfigMaps (GitHub installation mapping, project config)
- apiGroups: [""]
  resources: ["configmaps"]
  verbs: ["get", "create", "update", "patch"]
# Jobs (monitoring and cleanup when stopping sessions)
- apiGroups: ["batch"]
  resources: ["jobs"]
  verbs: ["get", "list", "watch", "create", "delete"]
# CronJobs (scheduled sessions)
- apiGroups: ["batch"]
  resources: ["cronjobs"]
  verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
# Pods (cleanup when stopping sessions, temp content pods)
- apiGroups: [""]
  resources: ["pods"]
  verbs: ["get", "list", "watch", "create", "delete", "deletecollection"]
- apiGroups: [""]
  resources: ["pods/log"]
  verbs: ["get"]
# PVCs (checking workspace status, temp content pods)
- apiGroups: [""]
  resources: ["persistentvolumeclaims"]
  verbs: ["get", "list", "watch"]
# Services (temp content pod services)
- apiGroups: [""]
  resources: ["services"]
  verbs: ["get", "list", "create", "delete"]
