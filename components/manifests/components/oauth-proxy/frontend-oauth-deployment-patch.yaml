# Patch for production frontend deployment
# - Adds OAuth proxy sidecar for authentication using OpenShift OAuth
# - Uses service account token for cookie secret (no vault secret needed)
# - Overrides resource limits to prevent OOMKills (sawtooth memory pattern)
apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend
spec:
  template:
    spec:
      containers:
      # Frontend container - increased limits to prevent OOMKills
      - name: frontend
        resources:
          requests:
            memory: 512Mi
            cpu: 200m
          limits:
            memory: 2Gi
            cpu: 1000m
      # OAuth proxy sidecar
      - name: oauth-proxy
        image: registry.redhat.io/openshift4/ose-oauth-proxy-rhel9:v4.18.0-202506230505.p0.gcbd44ad.assembly.stream.el9
        imagePullPolicy: IfNotPresent
        args:
        - --https-address=:8443
        - --provider=openshift
        - --openshift-service-account=frontend
        - --upstream=http://localhost:3000
        - --openshift-delegate-urls={"/api":{"resource":"namespaces","verb":"get","name":"ambient-code","namespace":"ambient-code"},"/federate":{"resource":"namespaces","verb":"get","name":"ambient-code","namespace":"ambient-code"}}
        - --tls-cert=/etc/tls/private/tls.crt
        - --tls-key=/etc/tls/private/tls.key
        - --cookie-secret-file=/var/run/secrets/kubernetes.io/serviceaccount/token
        - --upstream-timeout=5m
        - --skip-auth-regex=^/metrics
        ports:
        - containerPort: 8443
          name: dashboard-ui
        livenessProbe:
          httpGet:
            path: /oauth/healthz
            port: dashboard-ui
            scheme: HTTPS
          initialDelaySeconds: 10
          timeoutSeconds: 1
          periodSeconds: 10
          successThreshold: 1
          failureThreshold: 3
        readinessProbe:
          httpGet:
            path: /oauth/healthz
            port: dashboard-ui
            scheme: HTTPS
          initialDelaySeconds: 10
          timeoutSeconds: 1
          periodSeconds: 10
          successThreshold: 1
          failureThreshold: 3
        resources:
          requests:
            memory: 50Mi
            cpu: 10m
          limits:
            memory: 200Mi
            cpu: 200m
        volumeMounts:
        - mountPath: /etc/tls/private
          name: frontend-proxy-tls
      volumes:
      - name: frontend-proxy-tls
        secret:
          secretName: frontend-proxy-tls
