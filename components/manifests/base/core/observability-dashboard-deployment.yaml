apiVersion: apps/v1
kind: Deployment
metadata:
  name: observability-dashboard
  labels:
    app: observability-dashboard
spec:
  replicas: 1
  selector:
    matchLabels:
      app: observability-dashboard
  template:
    metadata:
      labels:
        app: observability-dashboard
    spec:
      containers:
      - name: observability-dashboard
        imagePullPolicy: Always
        image: quay.io/ambient_code/vteam_observability_dashboard:latest
        ports:
        - containerPort: 3000
          name: http
        resources:
          requests:
            cpu: 50m
            memory: 128Mi
          limits:
            cpu: 200m
            memory: 256Mi
        livenessProbe:
          httpGet:
            path: /
            port: http
          initialDelaySeconds: 10
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /
            port: http
          initialDelaySeconds: 5
          periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: observability-dashboard-service
  labels:
    app: observability-dashboard
spec:
  selector:
    app: observability-dashboard
  ports:
  - port: 3000
    targetPort: http
    protocol: TCP
    name: http
  type: ClusterIP
