apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: projectsettings.vteam.ambient-code
spec:
  group: vteam.ambient-code
  versions:
  - name: v1alpha1
    served: true
    storage: true
    schema:
      openAPIV3Schema:
        type: object
        x-kubernetes-validations:
        - rule: "self.metadata.name == 'projectsettings'"
          message: "metadata.name must be 'projectsettings' (singleton per namespace)"
        properties:
          spec:
            type: object
            required:
            - groupAccess
            properties:
              groupAccess:
                type: array
                description: "Group access configuration creating RoleBindings"
                items:
                  type: object
                  required:
                  - groupName
                  - role
                  properties:
                    groupName:
                      type: string
                      description: "Name of the group to grant access"
                    role:
                      type: string
                      enum:
                      - "admin"
                      - "edit"
                      - "view"
                      description: "Role to assign to the group (admin/edit/view)"
              runnerSecretsName:
                type: string
                description: "Name of the Kubernetes Secret in this namespace that stores runner configuration key/value pairs"
              repositories:
                type: array
                description: "Git repositories configured for this project"
                items:
                  type: object
                  required:
                  - url
                  properties:
                    url:
                      type: string
                      description: "Repository URL (HTTPS or SSH format)"
                    branch:
                      type: string
                      description: "Optional branch override (defaults to repository's default branch)"
                    provider:
                      type: string
                      enum:
                      - "github"
                      - "gitlab"
                      description: "Git hosting provider (auto-detected from URL if not specified)"
              inactivityTimeoutSeconds:
                type: integer
                minimum: 0
                default: 86400
                description: "Default inactivity timeout for sessions in this project (seconds). 0 disables. Overridden by session-level spec.inactivityTimeout."
              installedItems:
                type: array
                description: "Skills, commands, agents, and workflows installed from external sources"
                items:
                  type: object
                  required:
                  - sourceUrl
                  - itemId
                  - itemType
                  properties:
                    sourceUrl:
                      type: string
                      description: "Git URL of the source repository"
                    sourceBranch:
                      type: string
                      default: "main"
                      description: "Branch of the source repository"
                    sourcePath:
                      type: string
                      description: "Base path within the repository"
                    itemId:
                      type: string
                      description: "Item identifier"
                    itemType:
                      type: string
                      enum:
                      - "skill"
                      - "command"
                      - "agent"
                      - "workflow"
                      description: "Type of the installed item"
                    itemName:
                      type: string
                      description: "Display name of the item"
                    filePath:
                      type: string
                      description: "Path within the repository to the item file or directory"
          status:
            type: object
            properties:
              groupBindingsCreated:
                type: integer
                minimum: 0
                description: "Number of group RoleBindings successfully created"
              scheduledSessionRBACReady:
                type: boolean
                description: "Whether RBAC for scheduled session triggers is provisioned"
    additionalPrinterColumns:
    - name: Age
      type: date
      jsonPath: .metadata.creationTimestamp
  scope: Namespaced
  names:
    plural: projectsettings
    singular: projectsetting
    kind: ProjectSettings
    shortNames:
    - ps
