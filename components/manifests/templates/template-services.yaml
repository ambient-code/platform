apiVersion: template.openshift.io/v1
kind: Template
metadata:
  name: ambient-code-services
  annotations:
    description: Ambient Code Platform - Application services
parameters:
- name: IMAGE_TAG
  description: Image tag to deploy (auto-generated from git commit)
  required: true
- name: IMAGE_BACKEND
  description: Backend API image
  value: quay.io/redhat-services-prod/hcm-eng-prod-tenant/ambient-code-main/ambient-code-backend-main
  required: true
- name: IMAGE_FRONTEND
  description: Frontend image
  value: quay.io/redhat-services-prod/hcm-eng-prod-tenant/ambient-code-main/ambient-code-frontend-main
  required: true
- name: IMAGE_PUBLIC_API
  description: Public API image
  value: quay.io/redhat-services-prod/hcm-eng-prod-tenant/ambient-code-main/ambient-code-public-api-main
  required: true
- name: IMAGE_AMBIENT_API_SERVER
  description: Ambient API Server image
  value: quay.io/redhat-services-prod/hcm-eng-prod-tenant/ambient-code-main/ambient-code-ambient-api-server-main
  required: true
objects:
- apiVersion: v1
  kind: ServiceAccount
  metadata:
    labels:
      app: ambient-api-server
    name: ambient-api-server
    namespace: ambient-code
- apiVersion: v1
  kind: ServiceAccount
  metadata:
    name: backend-api
    namespace: ambient-code
- apiVersion: v1
  kind: ServiceAccount
  metadata:
    name: frontend
    namespace: ambient-code
- apiVersion: v1
  kind: ServiceAccount
  metadata:
    labels:
      app: public-api
    name: public-api
    namespace: ambient-code
- apiVersion: v1
  data:
    acl.yml: "- claim: email\n  pattern: ^.*@(redhat\\.com|ambient\\.code)$\n"
    jwks.json: '{"keys":[]}

      '
  kind: ConfigMap
  metadata:
    labels:
      app: ambient-api-server
      component: auth
    name: ambient-api-server-auth
    namespace: ambient-code
- apiVersion: v1
  data:
    flags.json: "{\n  \"flags\": [\n    {\n      \"name\": \"runner.gemini-cli.enabled\",\n      \"description\": \"Enable Gemini CLI runner type for session creation\",\n      \"tags\": [\n        {\n          \"type\": \"scope\",\n          \"value\": \"workspace\"\n        }\n      ]\n    },\n    {\n      \"name\": \"ldap.autocomplete.enabled\",\n      \"description\": \"Enable LDAP user and group autocomplete for workspace sharing\",\n      \"tags\": [\n        {\n          \"type\": \"scope\",\n          \"value\": \"workspace\"\n        }\n      ]\n    },\n    {\n      \"name\": \"scheduled-session.reuse.enabled\",\n      \"description\": \"Enable reuse last session option for scheduled sessions\",\n      \"tags\": [\n        {\n          \"type\": \"scope\",\n          \"value\": \"workspace\"\n        }\n      ]\n    },\n    {\n      \"name\": \"jira-write\",\n      \"description\": \"Allow Jira MCP server to perform write operations in new sessions\",\n      \"tags\": [\n      \
      \  {\n          \"type\": \"scope\",\n          \"value\": \"workspace\"\n        }\n      ]\n    }\n  ]\n}\n"
  kind: ConfigMap
  metadata:
    name: ambient-flags
    namespace: ambient-code
- apiVersion: v1
  kind: Secret
  metadata:
    labels:
      app: ambient-api-server
      component: api
    name: ambient-api-server
    namespace: ambient-code
  stringData:
    sentry.key: ''
  type: Opaque
- apiVersion: v1
  kind: Service
  metadata:
    annotations:
      description: Exposes the ambient-api-server REST API
    labels:
      app: ambient-api-server
      component: api
    name: ambient-api-server
    namespace: ambient-code
  spec:
    ports:
    - name: api
      port: 8000
      protocol: TCP
      targetPort: 8000
    - name: grpc
      port: 9000
      protocol: TCP
      targetPort: 9000
    - name: metrics
      port: 4433
      protocol: TCP
      targetPort: 4433
    - name: health
      port: 4434
      protocol: TCP
      targetPort: 4434
    selector:
      app: ambient-api-server
      component: api
- apiVersion: v1
  kind: Service
  metadata:
    labels:
      app: backend-api
    name: backend-service
    namespace: ambient-code
  spec:
    ports:
    - name: http
      port: 8080
      protocol: TCP
      targetPort: http
    selector:
      app: backend-api
    type: ClusterIP
- apiVersion: v1
  kind: Service
  metadata:
    labels:
      app: frontend
    name: frontend-service
    namespace: ambient-code
  spec:
    ports:
    - name: http
      port: 3000
      protocol: TCP
      targetPort: http
    selector:
      app: frontend
    type: ClusterIP
- apiVersion: v1
  kind: Service
  metadata:
    labels:
      app: public-api
    name: public-api-service
    namespace: ambient-code
  spec:
    ports:
    - name: http
      port: 8081
      protocol: TCP
      targetPort: http
    selector:
      app: public-api
    type: ClusterIP
- apiVersion: v1
  kind: LimitRange
  metadata:
    labels:
      ambient-code.io/managed: 'true'
      app.kubernetes.io/managed-by: ambient-code
    name: ambient-default-limits
    namespace: ambient-code
  spec:
    limits:
    - default:
        cpu: '2'
        memory: 4Gi
      defaultRequest:
        cpu: 250m
        memory: 256Mi
      type: Container
- apiVersion: v1
  kind: PersistentVolumeClaim
  metadata:
    labels:
      app: backend-api
      component: state-storage
    name: backend-state-pvc
    namespace: ambient-code
  spec:
    accessModes:
    - ReadWriteOnce
    resources:
      requests:
        storage: 5Gi
- apiVersion: apps/v1
  kind: Deployment
  metadata:
    labels:
      app: ambient-api-server
      component: api
    name: ambient-api-server
    namespace: ambient-code
  spec:
    replicas: 1
    selector:
      matchLabels:
        app: ambient-api-server
        component: api
    strategy:
      rollingUpdate:
        maxSurge: 25%
        maxUnavailable: 25%
      type: RollingUpdate
    template:
      metadata:
        labels:
          app: ambient-api-server
          component: api
      spec:
        containers:
        - command:
          - /usr/local/bin/ambient-api-server
          - serve
          - --db-host-file=/secrets/db/db.host
          - --db-port-file=/secrets/db/db.port
          - --db-user-file=/secrets/db/db.user
          - --db-password-file=/secrets/db/db.password
          - --db-name-file=/secrets/db/db.name
          - --enable-jwt=true
          - --enable-authz=false
          - --jwk-cert-file=/configs/authentication/jwks.json
          - --enable-https=false
          - --api-server-bindaddress=:8000
          - --metrics-server-bindaddress=:4433
          - --health-check-server-bindaddress=:4434
          - --db-sslmode=disable
          - --db-max-open-connections=50
          - --enable-db-debug=false
          - --enable-metrics-https=false
          - --http-read-timeout=5s
          - --http-write-timeout=30s
          - --cors-allowed-origins=*
          - --cors-allowed-headers=X-Ambient-Project
          - --enable-grpc=true
          - --grpc-server-bindaddress=:9000
          - --alsologtostderr
          - -v=4
          env:
          - name: AMBIENT_ENV
            value: development
          image: ${IMAGE_AMBIENT_API_SERVER}:${IMAGE_TAG}
          imagePullPolicy: Always
          livenessProbe:
            httpGet:
              path: /api/ambient
              port: 8000
              scheme: HTTP
            initialDelaySeconds: 15
            periodSeconds: 5
          name: api-server
          ports:
          - containerPort: 8000
            name: api
            protocol: TCP
          - containerPort: 4433
            name: metrics
            protocol: TCP
          - containerPort: 4434
            name: health
            protocol: TCP
          - containerPort: 9000
            name: grpc
            protocol: TCP
          readinessProbe:
            httpGet:
              httpHeaders:
              - name: User-Agent
                value: Probe
              path: /healthcheck
              port: 4434
              scheme: HTTP
            initialDelaySeconds: 20
            periodSeconds: 10
          resources:
            limits:
              cpu: 1
              memory: 1Gi
            requests:
              cpu: 200m
              memory: 512Mi
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
              - ALL
            readOnlyRootFilesystem: false
          volumeMounts:
          - mountPath: /secrets/db
            name: db-secrets
          - mountPath: /secrets/service
            name: app-secrets
          - mountPath: /configs/authentication
            name: auth-config
        initContainers:
        - command:
          - /usr/local/bin/ambient-api-server
          - migrate
          - --db-host-file=/secrets/db/db.host
          - --db-port-file=/secrets/db/db.port
          - --db-user-file=/secrets/db/db.user
          - --db-password-file=/secrets/db/db.password
          - --db-name-file=/secrets/db/db.name
          - --alsologtostderr
          - -v=4
          image: ${IMAGE_AMBIENT_API_SERVER}:${IMAGE_TAG}
          imagePullPolicy: Always
          name: migration
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
              - ALL
            readOnlyRootFilesystem: false
          volumeMounts:
          - mountPath: /secrets/db
            name: db-secrets
        serviceAccountName: ambient-api-server
        volumes:
        - name: db-secrets
          secret:
            secretName: ambient-api-server-db
        - name: app-secrets
          secret:
            secretName: ambient-api-server
        - configMap:
            name: ambient-api-server-auth
          name: auth-config
- apiVersion: apps/v1
  kind: Deployment
  metadata:
    labels:
      app: backend-api
    name: backend-api
    namespace: ambient-code
  spec:
    replicas: 1
    selector:
      matchLabels:
        app: backend-api
    strategy:
      type: Recreate
    template:
      metadata:
        labels:
          app: backend-api
          role: backend
      spec:
        containers:
        - env:
          - name: NAMESPACE
            valueFrom:
              fieldRef:
                fieldPath: metadata.namespace
          - name: PORT
            value: '8080'
          - name: STATE_BASE_DIR
            value: /workspace
          - name: SPEC_KIT_REPO
            value: ambient-code/spec-kit-rh
          - name: SPEC_KIT_VERSION
            value: main
          - name: SPEC_KIT_TEMPLATE
            value: spec-kit-template-claude-sh
          - name: IMAGE_PULL_POLICY
            valueFrom:
              configMapKeyRef:
                key: IMAGE_PULL_POLICY
                name: operator-config
                optional: true
          - name: GITHUB_APP_ID
            valueFrom:
              secretKeyRef:
                key: GITHUB_APP_ID
                name: github-app-secret
                optional: true
          - name: GITHUB_PRIVATE_KEY
            valueFrom:
              secretKeyRef:
                key: GITHUB_PRIVATE_KEY
                name: github-app-secret
                optional: true
          - name: GITHUB_CLIENT_ID
            valueFrom:
              secretKeyRef:
                key: GITHUB_CLIENT_ID
                name: github-app-secret
                optional: true
          - name: GITHUB_CLIENT_SECRET
            valueFrom:
              secretKeyRef:
                key: GITHUB_CLIENT_SECRET
                name: github-app-secret
                optional: true
          - name: GITHUB_STATE_SECRET
            valueFrom:
              secretKeyRef:
                key: GITHUB_STATE_SECRET
                name: github-app-secret
                optional: true
          - name: GOOGLE_OAUTH_CLIENT_ID
            valueFrom:
              secretKeyRef:
                key: GOOGLE_OAUTH_CLIENT_ID
                name: google-workflow-app-secret
                optional: true
          - name: GOOGLE_OAUTH_CLIENT_SECRET
            valueFrom:
              secretKeyRef:
                key: GOOGLE_OAUTH_CLIENT_SECRET
                name: google-workflow-app-secret
                optional: true
          - name: OAUTH_STATE_SECRET
            valueFrom:
              secretKeyRef:
                key: OAUTH_STATE_SECRET
                name: google-workflow-app-secret
                optional: true
          - name: BACKEND_URL
            valueFrom:
              secretKeyRef:
                key: BACKEND_URL
                name: google-workflow-app-secret
                optional: true
          - name: OPERATOR_IMAGE
            valueFrom:
              configMapKeyRef:
                key: OPERATOR_IMAGE
                name: operator-config
                optional: true
          - name: OOTB_WORKFLOWS_REPO
            value: https://github.com/ambient-code/workflows.git
          - name: OOTB_WORKFLOWS_BRANCH
            value: main
          - name: OOTB_WORKFLOWS_PATH
            value: workflows
          - name: USE_VERTEX
            valueFrom:
              configMapKeyRef:
                key: USE_VERTEX
                name: operator-config
                optional: true
          - name: CLOUD_ML_REGION
            valueFrom:
              configMapKeyRef:
                key: CLOUD_ML_REGION
                name: operator-config
                optional: true
          - name: ANTHROPIC_VERTEX_PROJECT_ID
            valueFrom:
              configMapKeyRef:
                key: ANTHROPIC_VERTEX_PROJECT_ID
                name: operator-config
                optional: true
          - name: GOOGLE_APPLICATION_CREDENTIALS
            valueFrom:
              configMapKeyRef:
                key: GOOGLE_APPLICATION_CREDENTIALS
                name: operator-config
                optional: true
          - name: LDAP_SRV_DOMAIN
            valueFrom:
              configMapKeyRef:
                key: LDAP_SRV_DOMAIN
                name: ldap-config
                optional: true
          - name: LDAP_URL
            valueFrom:
              configMapKeyRef:
                key: LDAP_URL
                name: ldap-config
                optional: true
          - name: LDAP_BASE_DN
            valueFrom:
              configMapKeyRef:
                key: LDAP_BASE_DN
                name: ldap-config
                optional: true
          - name: LDAP_GROUP_BASE_DN
            valueFrom:
              configMapKeyRef:
                key: LDAP_GROUP_BASE_DN
                name: ldap-config
                optional: true
          - name: LDAP_BIND_DN
            valueFrom:
              configMapKeyRef:
                key: LDAP_BIND_DN
                name: ldap-config
                optional: true
          - name: LDAP_BIND_PASSWORD
            valueFrom:
              secretKeyRef:
                key: LDAP_BIND_PASSWORD
                name: ldap-credentials
                optional: true
          - name: LDAP_CA_CERT_PATH
            valueFrom:
              configMapKeyRef:
                key: LDAP_CA_CERT_PATH
                name: ldap-config
                optional: true
          - name: UNLEASH_URL
            valueFrom:
              secretKeyRef:
                key: unleash-url
                name: unleash-credentials
                optional: true
          - name: UNLEASH_CLIENT_KEY
            valueFrom:
              secretKeyRef:
                key: client-api-token
                name: unleash-credentials
                optional: true
          - name: UNLEASH_ADMIN_URL
            valueFrom:
              secretKeyRef:
                key: unleash-admin-url
                name: unleash-credentials
                optional: true
          - name: UNLEASH_ADMIN_TOKEN
            valueFrom:
              secretKeyRef:
                key: admin-api-token
                name: unleash-credentials
                optional: true
          - name: UNLEASH_PROJECT
            valueFrom:
              secretKeyRef:
                key: unleash-project
                name: unleash-credentials
                optional: true
          - name: UNLEASH_ENVIRONMENT
            valueFrom:
              secretKeyRef:
                key: unleash-environment
                name: unleash-credentials
                optional: true
          image: ${IMAGE_BACKEND}:${IMAGE_TAG}
          imagePullPolicy: Always
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 30
            periodSeconds: 10
          name: backend-api
          ports:
          - containerPort: 8080
            name: http
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 5
            periodSeconds: 5
          resources:
            limits:
              cpu: '1'
              memory: 1536Mi
            requests:
              cpu: 200m
              memory: 512Mi
          volumeMounts:
          - mountPath: /workspace
            name: backend-state
          - mountPath: /app/vertex
            name: vertex-credentials
            readOnly: true
          - mountPath: /config/models
            name: model-manifest
            readOnly: true
          - mountPath: /config/flags
            name: flags-config
            readOnly: true
          - mountPath: /config/registry
            name: agent-registry
            readOnly: true
          - mountPath: /etc/pki/custom-ca
            name: ldap-ca-cert
            readOnly: true
        serviceAccountName: backend-api
        volumes:
        - name: backend-state
          persistentVolumeClaim:
            claimName: backend-state-pvc
        - name: vertex-credentials
          secret:
            optional: true
            secretName: ambient-vertex
        - configMap:
            name: ambient-models
            optional: true
          name: model-manifest
        - configMap:
            name: ambient-flags
            optional: true
          name: flags-config
        - configMap:
            name: ambient-agent-registry
            optional: true
          name: agent-registry
        - configMap:
            name: ldap-ca-cert
            optional: true
          name: ldap-ca-cert
- apiVersion: apps/v1
  kind: Deployment
  metadata:
    labels:
      app: frontend
    name: frontend
    namespace: ambient-code
  spec:
    selector:
      matchLabels:
        app: frontend
    template:
      metadata:
        labels:
          app: frontend
      spec:
        containers:
        - env:
          - name: BACKEND_URL
            value: http://backend-service:8080/api
          - name: NODE_ENV
            value: production
          - name: GITHUB_APP_SLUG
            value: ambient-code
          - name: UNLEASH_URL
            valueFrom:
              secretKeyRef:
                key: unleash-url
                name: unleash-credentials
                optional: true
          - name: UNLEASH_CLIENT_KEY
            valueFrom:
              secretKeyRef:
                key: client-api-token
                name: unleash-credentials
                optional: true
          image: ${IMAGE_FRONTEND}:${IMAGE_TAG}
          imagePullPolicy: Always
          livenessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 30
            periodSeconds: 10
          name: frontend
          ports:
          - containerPort: 3000
            name: http
          readinessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 5
            periodSeconds: 5
          resources:
            limits:
              cpu: 500m
              memory: 512Mi
            requests:
              cpu: 100m
              memory: 256Mi
        serviceAccountName: frontend
- apiVersion: apps/v1
  kind: Deployment
  metadata:
    labels:
      app: public-api
    name: public-api
    namespace: ambient-code
  spec:
    replicas: 1
    selector:
      matchLabels:
        app: public-api
    template:
      metadata:
        labels:
          app: public-api
          role: api-gateway
      spec:
        containers:
        - env:
          - name: PORT
            value: '8081'
          - name: BACKEND_URL
            value: http://backend-service:8080
          - name: GIN_MODE
            value: release
          - name: BACKEND_TIMEOUT
            value: 30s
          - name: RATE_LIMIT_RPS
            value: '100'
          - name: RATE_LIMIT_BURST
            value: '200'
          image: ${IMAGE_PUBLIC_API}:${IMAGE_TAG}
          imagePullPolicy: Always
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
          name: public-api
          ports:
          - containerPort: 8081
            name: http
          readinessProbe:
            httpGet:
              path: /ready
              port: http
            initialDelaySeconds: 5
            periodSeconds: 5
          resources:
            limits:
              cpu: 200m
              memory: 256Mi
            requests:
              cpu: 50m
              memory: 128Mi
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
              - ALL
            readOnlyRootFilesystem: true
            runAsNonRoot: true
        serviceAccountName: public-api
- apiVersion: policy/v1
  kind: PodDisruptionBudget
  metadata:
    labels:
      app: public-api
    name: public-api-pdb
    namespace: ambient-code
  spec:
    minAvailable: 1
    selector:
      matchLabels:
        app: public-api
- apiVersion: route.openshift.io/v1
  kind: Route
  metadata:
    labels:
      app: ambient-api-server
      component: api
    name: ambient-api-server
    namespace: ambient-code
  spec:
    port:
      targetPort: api
    tls:
      insecureEdgeTerminationPolicy: Redirect
      termination: reencrypt
    to:
      kind: Service
      name: ambient-api-server
- apiVersion: route.openshift.io/v1
  kind: Route
  metadata:
    labels:
      app: ambient-api-server
      component: grpc
    name: ambient-api-server-grpc
    namespace: ambient-code
  spec:
    port:
      targetPort: grpc
    tls:
      insecureEdgeTerminationPolicy: Redirect
      termination: reencrypt
    to:
      kind: Service
      name: ambient-api-server
- apiVersion: route.openshift.io/v1
  kind: Route
  metadata:
    labels:
      app: backend-api
    name: backend-route
    namespace: ambient-code
  spec:
    port:
      targetPort: http
    tls:
      insecureEdgeTerminationPolicy: Redirect
      termination: edge
    to:
      kind: Service
      name: backend-service
      weight: 100
    wildcardPolicy: None
- apiVersion: route.openshift.io/v1
  kind: Route
  metadata:
    annotations:
      haproxy.router.openshift.io/balance: roundrobin
      haproxy.router.openshift.io/disable_cookies: 'true'
    labels:
      app: frontend
    name: frontend-route
    namespace: ambient-code
  spec:
    port:
      targetPort: dashboard-ui
    tls:
      insecureEdgeTerminationPolicy: Redirect
      termination: edge
    to:
      kind: Service
      name: frontend-service
      weight: 100
    wildcardPolicy: None
- apiVersion: route.openshift.io/v1
  kind: Route
  metadata:
    labels:
      app: public-api
    name: public-api-route
    namespace: ambient-code
  spec:
    port:
      targetPort: http
    tls:
      insecureEdgeTerminationPolicy: Redirect
      termination: edge
    to:
      kind: Service
      name: public-api-service
      weight: 100
    wildcardPolicy: None
