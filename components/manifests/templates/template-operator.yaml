apiVersion: template.openshift.io/v1
kind: Template
metadata:
  name: ambient-code-operator
  annotations:
    description: Ambient Code Platform - Platform components (CRDs, RBAC, Operator)
parameters:
- name: IMAGE_TAG
  description: Image tag to deploy (auto-generated from git commit)
  required: true
- name: IMAGE_OPERATOR
  description: Operator image
  value: quay.io/redhat-services-prod/hcm-eng-prod-tenant/ambient-code-main/ambient-code-operator-main
  required: true
- name: IMAGE_AMBIENT_RUNNER
  description: Ambient Runner image
  value: quay.io/redhat-services-prod/hcm-eng-prod-tenant/ambient-code-main/ambient-code-ambient-runner-main
  required: true
objects:
- apiVersion: apiextensions.k8s.io/v1
  kind: CustomResourceDefinition
  metadata:
    name: agenticsessions.vteam.ambient-code
  spec:
    group: vteam.ambient-code
    names:
      kind: AgenticSession
      plural: agenticsessions
      shortNames:
      - as
      singular: agenticsession
    scope: Namespaced
    versions:
    - name: v1alpha1
      schema:
        openAPIV3Schema:
          properties:
            spec:
              properties:
                activeWorkflow:
                  description: Active workflow configuration for dynamic workflow switching
                  properties:
                    branch:
                      default: main
                      description: Branch to clone
                      type: string
                    gitUrl:
                      description: Git repository URL for the workflow
                      type: string
                    path:
                      description: Optional path within repo (for repos with multiple workflows)
                      type: string
                  type: object
                displayName:
                  description: A descriptive display name for the agentic session generated from prompt and website
                  type: string
                environmentVariables:
                  additionalProperties:
                    type: string
                  description: 'Key-value pairs injected as environment variables into all pod containers (init-hydrate, runner, state-sync). Reserved variables (SESSION_NAME, S3_ENDPOINT, S3_BUCKET, AWS_ACCESS_KEY_ID, AWS_SECRET_ACCESS_KEY, NAMESPACE, SYNC_INTERVAL) cannot be overridden in init-hydrate and state-sync containers. Common conventions: RUNNER_TYPE identifies the runner framework (e.g. "claude-agent-sdk", "gemini-cli"), RUNNER_STATE_DIR sets the framework state directory relative to /workspace (defaults to ".claude").'
                  type: object
                inactivityTimeout:
                  description: Seconds of inactivity before auto-stopping a session. 0 disables auto-shutdown. If omitted, falls back to project-level inactivityTimeoutSeconds, then 24h default.
                  minimum: 0
                  type: integer
                initialPrompt:
                  description: Initial prompt used only on first SDK invocation for brand new sessions (ignored on continuations or workflow restarts).
                  type: string
                llmSettings:
                  description: LLM configuration settings
                  properties:
                    maxTokens:
                      default: 4000
                      type: integer
                    model:
                      default: claude-3-7-sonnet-latest
                      type: string
                    temperature:
                      default: 0.7
                      type: number
                  type: object
                repos:
                  description: List of Git repositories to clone and work with
                  items:
                    properties:
                      autoPush:
                        default: false
                        description: When true, automatically commit and push changes to this repository after session completion
                        type: boolean
                      branch:
                        default: main
                        description: Branch to checkout
                        type: string
                      url:
                        description: Git repository URL
                        type: string
                    required:
                    - url
                    type: object
                  type: array
                stopOnRunFinished:
                  description: When true, automatically stop the session when the agent completes its run (RUN_FINISHED event). Useful for one-shot tasks triggered by automation.
                  type: boolean
                timeout:
                  default: 300
                  description: Timeout in seconds for the agentic session
                  type: integer
                userContext:
                  description: Authenticated caller identity captured at creation time (used for authorization and audit)
                  properties:
                    displayName:
                      description: Human-readable display name
                      type: string
                    groups:
                      description: Group memberships of the user
                      items:
                        type: string
                      type: array
                    userId:
                      description: Stable user identifier (from SSO, always overwritten from auth token)
                      type: string
                  type: object
              type: object
            status:
              properties:
                completionTime:
                  description: Timestamp when the session reached a terminal phase.
                  format: date-time
                  type: string
                conditions:
                  description: Detailed condition set describing reconciliation progress.
                  items:
                    properties:
                      lastTransitionTime:
                        format: date-time
                        type: string
                      message:
                        type: string
                      observedGeneration:
                        format: int64
                        type: integer
                      reason:
                        type: string
                      status:
                        enum:
                        - 'True'
                        - 'False'
                        - Unknown
                        type: string
                      type:
                        type: string
                    required:
                    - type
                    - status
                    type: object
                  type: array
                lastActivityTime:
                  description: Timestamp of last recorded AG-UI activity in this session.
                  format: date-time
                  type: string
                observedGeneration:
                  description: Spec generation that the operator has fully reconciled.
                  format: int64
                  type: integer
                phase:
                  default: Pending
                  enum:
                  - Pending
                  - Creating
                  - Running
                  - Stopping
                  - Stopped
                  - Completed
                  - Failed
                  type: string
                reconciledRepos:
                  description: Current reconciliation state for each repository.
                  items:
                    properties:
                      branch:
                        description: 'DEPRECATED: Use currentActiveBranch instead'
                        type: string
                      branches:
                        description: All local branches available in this repository
                        items:
                          type: string
                        type: array
                      clonedAt:
                        format: date-time
                        type: string
                      currentActiveBranch:
                        description: Currently checked out branch (polled from filesystem)
                        type: string
                      defaultBranch:
                        description: Default branch of the remote repository (e.g., main, master)
                        type: string
                      name:
                        type: string
                      status:
                        enum:
                        - Cloning
                        - Ready
                        - Failed
                        type: string
                      url:
                        type: string
                    type: object
                  type: array
                reconciledWorkflow:
                  description: Current reconciliation state for the active workflow.
                  properties:
                    appliedAt:
                      format: date-time
                      type: string
                    branch:
                      type: string
                    gitUrl:
                      type: string
                    path:
                      description: Optional path within the workflow repository
                      type: string
                    status:
                      enum:
                      - Cloning
                      - Active
                      - Failed
                      type: string
                  type: object
                sdkRestartCount:
                  description: Number of times the SDK has been restarted during this session.
                  type: integer
                sdkSessionId:
                  description: SDK session identifier captured for resume support.
                  type: string
                startTime:
                  description: Timestamp when the session runner started executing.
                  format: date-time
                  type: string
                stoppedReason:
                  description: Reason the session was stopped.
                  enum:
                  - user
                  - inactivity
                  type: string
              type: object
          type: object
      served: true
      storage: true
      subresources:
        status: {}
- apiVersion: apiextensions.k8s.io/v1
  kind: CustomResourceDefinition
  metadata:
    name: projectsettings.vteam.ambient-code
  spec:
    group: vteam.ambient-code
    names:
      kind: ProjectSettings
      plural: projectsettings
      shortNames:
      - ps
      singular: projectsetting
    scope: Namespaced
    versions:
    - additionalPrinterColumns:
      - jsonPath: .metadata.creationTimestamp
        name: Age
        type: date
      name: v1alpha1
      schema:
        openAPIV3Schema:
          properties:
            spec:
              properties:
                groupAccess:
                  description: Group access configuration creating RoleBindings
                  items:
                    properties:
                      groupName:
                        description: Name of the group to grant access
                        type: string
                      role:
                        description: Role to assign to the group (admin/edit/view)
                        enum:
                        - admin
                        - edit
                        - view
                        type: string
                    required:
                    - groupName
                    - role
                    type: object
                  type: array
                inactivityTimeoutSeconds:
                  default: 86400
                  description: Default inactivity timeout for sessions in this project (seconds). 0 disables. Overridden by session-level spec.inactivityTimeout.
                  minimum: 0
                  type: integer
                repositories:
                  description: Git repositories configured for this project
                  items:
                    properties:
                      branch:
                        description: Optional branch override (defaults to repository's default branch)
                        type: string
                      provider:
                        description: Git hosting provider (auto-detected from URL if not specified)
                        enum:
                        - github
                        - gitlab
                        type: string
                      url:
                        description: Repository URL (HTTPS or SSH format)
                        type: string
                    required:
                    - url
                    type: object
                  type: array
                runnerSecretsName:
                  description: Name of the Kubernetes Secret in this namespace that stores runner configuration key/value pairs
                  type: string
              required:
              - groupAccess
              type: object
            status:
              properties:
                groupBindingsCreated:
                  description: Number of group RoleBindings successfully created
                  minimum: 0
                  type: integer
                limitRangeReady:
                  description: Whether the default LimitRange for CA bin-packing is provisioned
                  type: boolean
                scheduledSessionRBACReady:
                  description: Whether RBAC for scheduled session triggers is provisioned
                  type: boolean
              type: object
          type: object
          x-kubernetes-validations:
          - message: metadata.name must be 'projectsettings' (singleton per namespace)
            rule: self.metadata.name == 'projectsettings'
      served: true
      storage: true
      subresources:
        status: {}
