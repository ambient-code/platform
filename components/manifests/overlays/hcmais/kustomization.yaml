apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: ambient-api

resources:
- ../../base
- ambient-ui-route.yaml
- api-server-route.yaml

components:
- ../../components/postgresql-rhel
- ../../components/ambient-api-server-db

patches:
# Remove resources we don't need in this overlay
- target:
    group: apps
    kind: Deployment
    name: backend-api
    version: v1
  patch: |
    $patch: delete
    apiVersion: apps/v1
    kind: Deployment
    metadata:
      name: backend-api
- target:
    group: apps
    kind: Deployment
    name: frontend
    version: v1
  patch: |
    $patch: delete
    apiVersion: apps/v1
    kind: Deployment
    metadata:
      name: frontend
- target:
    group: apps
    kind: Deployment
    name: agentic-operator
    version: v1
  patch: |
    $patch: delete
    apiVersion: apps/v1
    kind: Deployment
    metadata:
      name: agentic-operator
- target:
    group: apps
    kind: Deployment
    name: public-api
    version: v1
  patch: |
    $patch: delete
    apiVersion: apps/v1
    kind: Deployment
    metadata:
      name: public-api
- target:
    group: apps
    kind: Deployment
    name: unleash
    version: v1
  patch: |
    $patch: delete
    apiVersion: apps/v1
    kind: Deployment
    metadata:
      name: unleash
- target:
    group: apps
    kind: Deployment
    name: minio
    version: v1
  patch: |
    $patch: delete
    apiVersion: apps/v1
    kind: Deployment
    metadata:
      name: minio
- target:
    group: apps
    kind: Deployment
    name: observability-dashboard
    version: v1
  patch: |
    $patch: delete
    apiVersion: apps/v1
    kind: Deployment
    metadata:
      name: observability-dashboard
# Env patches for retained components
- path: ambient-api-server-env-patch.yaml
  target:
    group: apps
    kind: Deployment
    name: ambient-api-server
    version: v1
- path: control-plane-env-patch.yaml
  target:
    group: apps
    kind: Deployment
    name: ambient-control-plane
    version: v1
- path: ambient-ui-env-patch.yaml
  target:
    group: apps
    kind: Deployment
    name: ambient-ui
    version: v1

images:
- name: quay.io/ambient_code/vteam_api_server
  newTag: latest
- name: quay.io/ambient_code/vteam_control_plane
  newTag: latest
- name: quay.io/ambient_code/vteam_ambient_ui
  newTag: latest
