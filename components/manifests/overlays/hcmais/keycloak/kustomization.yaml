# REQUIRED: keycloak-admin-secret.yaml, keycloak-db.yaml, and
# keycloak-realm.json contain CHANGE_ME placeholder values.
# Replace them before deploying.
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: ambient-keycloak

resources:
- namespace.yaml
- keycloak-deployment.yaml
- keycloak-db.yaml
- keycloak-admin-secret.yaml

configMapGenerator:
- name: keycloak-realm-config
  files:
  - ambient-code-realm.json=keycloak-realm.json
  options:
    disableNameSuffixHash: true
