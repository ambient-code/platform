apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend
spec:
  template:
    spec:
      containers:
      - name: frontend
        env:
        - name: SSO_ENABLED
          value: "true"
        - name: NEXT_PUBLIC_SSO_ENABLED
          value: "true"
        - name: SSO_ISSUER_URL
          valueFrom:
            secretKeyRef:
              name: sso-credentials
              key: SSO_ISSUER_URL
        - name: SSO_CLIENT_ID
          valueFrom:
            secretKeyRef:
              name: sso-credentials
              key: SSO_CLIENT_ID
        - name: SSO_CLIENT_SECRET
          valueFrom:
            secretKeyRef:
              name: sso-credentials
              key: SSO_CLIENT_SECRET
        - name: SESSION_SECRET
          valueFrom:
            secretKeyRef:
              name: sso-credentials
              key: SESSION_SECRET
        - name: SSO_REDIRECT_URI
          value: "https://frontend-route-jsell-ambient-sso-poc.apps.rosa.hcmais01ue1.s9m2.p3.openshiftapps.com/api/auth/sso/callback"
        - name: SSO_PUBLIC_ISSUER_URL
          valueFrom:
            secretKeyRef:
              name: sso-credentials
              key: SSO_FRONTEND_ISSUER_URL
