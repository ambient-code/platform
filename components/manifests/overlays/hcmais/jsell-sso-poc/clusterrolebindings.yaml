# Apply separately: oc apply -f clusterrolebindings.yaml
# NOT included in kustomization.yaml because kustomize's namespace
# transformer rewrites all subject namespaces, which would break
# the ambient-code namespace bindings.
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: ambient-control-plane
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: ambient-control-plane
subjects:
- kind: ServiceAccount
  name: ambient-control-plane
  namespace: ambient-code
- kind: ServiceAccount
  name: ambient-control-plane
  namespace: jsell-ambient-sso-poc
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: agentic-operator
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: agentic-operator
subjects:
- kind: ServiceAccount
  name: agentic-operator
  namespace: ambient-code
- kind: ServiceAccount
  name: agentic-operator
  namespace: jsell-ambient-sso-poc
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: backend-api
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: backend-api
subjects:
- kind: ServiceAccount
  name: backend-api
  namespace: ambient-code
- kind: ServiceAccount
  name: backend-api
  namespace: jsell-ambient-sso-poc
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: ambient-frontend-auth
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: ambient-frontend-auth
subjects:
- kind: ServiceAccount
  name: frontend
  namespace: ambient-code
- kind: ServiceAccount
  name: frontend
  namespace: jsell-ambient-sso-poc
