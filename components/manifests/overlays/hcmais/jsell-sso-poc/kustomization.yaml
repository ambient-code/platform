apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: jsell-ambient-sso-poc

resources:
- ../../../base
# sso-credentials.yaml is excluded — it contains CHANGE_ME placeholders.
# Create the secret manually per workflows/deploy-native-sso.md Step 3a,
# or apply sso-credentials.yaml separately after replacing values.
- frontend-route.yaml
- public-api-route.yaml
- api-server-route.yaml
- operator-config-openshift.yaml
- ldap-config.yaml

components:
- ../../../components/postgresql-rhel
- ../../../components/ambient-api-server-db

patches:
- path: frontend-sso-patch.yaml
  target:
    group: apps
    kind: Deployment
    name: frontend
    version: v1
- path: backend-sso-patch.yaml
  target:
    group: apps
    kind: Deployment
    name: backend-api
    version: v1
- path: ambient-api-server-env-patch.yaml
  target:
    group: apps
    kind: Deployment
    name: ambient-api-server
    version: v1
- path: control-plane-env-patch.yaml
  target:
    group: apps
    kind: Deployment
    name: ambient-control-plane
    version: v1
- path: api-server-secret-patch.yaml
  target:
    kind: Secret
    name: ambient-api-server
    version: v1
- path: minio-pvc-patch.yaml
  target:
    kind: PersistentVolumeClaim
    name: minio-data
    version: v1

images:
- name: quay.io/ambient_code/vteam_backend
  newName: quay.io/rh-ee-jsell/vteam_backend
  newTag: latest
- name: quay.io/ambient_code/vteam_frontend
  newName: quay.io/rh-ee-jsell/vteam_frontend
  newTag: latest
- name: quay.io/ambient_code/vteam_operator
  newName: quay.io/rh-ee-jsell/vteam_operator
  newTag: latest
- name: quay.io/ambient_code/vteam_public_api
  newName: quay.io/rh-ee-jsell/vteam_public_api
  newTag: latest
- name: quay.io/ambient_code/vteam_api_server:latest
  newName: quay.io/rh-ee-jsell/vteam_api_server
  newTag: latest
