apiVersion: apps/v1
kind: Deployment
metadata:
  name: ambient-control-plane
spec:
  template:
    spec:
      containers:
        - name: ambient-control-plane
          env:
            - name: AMBIENT_API_SERVER_URL
              value: "http://ambient-api-server.ambient-api.svc:8000"
            - name: AMBIENT_GRPC_SERVER_ADDR
              value: "ambient-api-server.ambient-api.svc:9000"
            - name: AMBIENT_GRPC_USE_TLS
              value: "false"
            - name: CP_TOKEN_URL
              value: "http://ambient-control-plane.ambient-api.svc:8080/token"
            - name: OIDC_TOKEN_URL
              value: "https://keycloak-ambient-keycloak.apps.rosa.hcmais01ue1.s9m2.p3.openshiftapps.com/realms/ambient-code/protocol/openid-connect/token"
            - name: OIDC_CLIENT_ID
              valueFrom:
                secretKeyRef:
                  name: ambient-control-plane-oidc
                  key: client-id
            - name: OIDC_CLIENT_SECRET
              valueFrom:
                secretKeyRef:
                  name: ambient-control-plane-oidc
                  key: client-secret
