apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

metadata:
  name: ambient-mpp-preprod

# Namespace for all resources
namespace: ambient-code--runtime-int

# Resources: enumerate base resources individually to skip namespace.yaml,
# crds/, and ambient-api-server-secrets.yml (IT manages those in MPP).
resources:
- ../../base/rbac
- ../../base/backend-deployment.yaml
- ../../base/frontend-deployment.yaml
- ../../base/operator-deployment.yaml
- ../../base/public-api-deployment.yaml
- ../../base/workspace-pvc.yaml
- ../../base/minio-deployment.yaml
- ../../base/postgresql-deployment.yaml
- ../../base/ambient-api-server-db.yml
- ../../base/ambient-api-server-service.yml
- ../../base/unleash-deployment.yaml
- ../../base/agent-registry-configmap.yaml
# Preprod-specific routes and config
- ambient-api-server-route.yaml
- route.yaml
- backend-route.yaml
- public-api-route.yaml
- unleash-route.yaml
- operator-config-openshift.yaml

# Replicate base configMapGenerator (can't use ../../base as a whole)
configMapGenerator:
- name: ambient-models
  files:
  - ../../base/models.json
  options:
    disableNameSuffixHash: true
- name: ambient-flags
  files:
  - ../../base/flags.json
  options:
    disableNameSuffixHash: true

# IT MPP requires this label on all resources
commonLabels:
  paas.redhat.com/appcode: AMBC-001

# Patches for preprod environment
patches:
- path: frontend-oauth-deployment-patch.yaml
  target:
    kind: Deployment
    name: frontend
- path: frontend-oauth-service-patch.yaml
  target:
    kind: Service
    name: frontend-service
- path: postgresql-json-patch.yaml
  target:
    group: apps
    kind: Deployment
    name: postgresql
    version: v1
- path: unleash-init-db-patch.yaml
  target:
    group: apps
    kind: Deployment
    name: unleash
    version: v1
# MPP PVC requirements: aws-ebs storageClass, reclaimPolicy, appcode label
- path: pvc-reclaim-policy-patch.yaml
  target:
    kind: PersistentVolumeClaim
# Fix ClusterRoleBinding subject namespaces (ambient-code → ambient-code--runtime-int)
- path: clusterrolebinding-namespace-patch.yaml
  target:
    kind: ClusterRoleBinding
    name: backend-api
- path: clusterrolebinding-namespace-patch.yaml
  target:
    kind: ClusterRoleBinding
    name: ambient-users-can-list-projects
- path: clusterrolebinding-namespace-patch.yaml
  target:
    kind: ClusterRoleBinding
    name: ambient-frontend-auth
- path: clusterrolebinding-namespace-patch.yaml
  target:
    kind: ClusterRoleBinding
    name: agentic-operator

# Production images
images:
- name: quay.io/ambient_code/vteam_api_server:latest
  newName: quay.io/ambient_code/vteam_api_server
  newTag: latest
- name: quay.io/ambient_code/vteam_backend
  newName: quay.io/ambient_code/vteam_backend
  newTag: latest
- name: quay.io/ambient_code/vteam_backend:latest
  newName: quay.io/ambient_code/vteam_backend
  newTag: latest
- name: quay.io/ambient_code/vteam_claude_runner
  newName: quay.io/ambient_code/vteam_claude_runner
  newTag: latest
- name: quay.io/ambient_code/vteam_claude_runner:latest
  newName: quay.io/ambient_code/vteam_claude_runner
  newTag: latest
- name: quay.io/ambient_code/vteam_frontend
  newName: quay.io/ambient_code/vteam_frontend
  newTag: latest
- name: quay.io/ambient_code/vteam_frontend:latest
  newName: quay.io/ambient_code/vteam_frontend
  newTag: latest
- name: quay.io/ambient_code/vteam_operator
  newName: quay.io/ambient_code/vteam_operator
  newTag: latest
- name: quay.io/ambient_code/vteam_operator:latest
  newName: quay.io/ambient_code/vteam_operator
  newTag: latest
- name: quay.io/ambient_code/vteam_public_api
  newName: quay.io/ambient_code/vteam_public_api
  newTag: latest
- name: quay.io/ambient_code/vteam_public_api:latest
  newName: quay.io/ambient_code/vteam_public_api
  newTag: latest
- name: quay.io/ambient_code/vteam_state_sync:latest
  newName: quay.io/ambient_code/vteam_state_sync
  newTag: latest
