apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: ambient-control-plane-project-namespaces
rules:
  - apiGroups: [""]
    resources: ["secrets", "serviceaccounts", "services"]
    verbs: ["get", "list", "watch", "create", "delete", "deletecollection"]
  - apiGroups: [""]
    resources: ["pods"]
    verbs: ["get", "list", "watch", "delete", "deletecollection"]
  - apiGroups: ["rbac.authorization.k8s.io"]
    resources: ["rolebindings"]
    verbs: ["get", "list", "watch", "create", "delete"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: ambient-control-plane-project-namespaces
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: ambient-control-plane-project-namespaces
subjects:
  - kind: ServiceAccount
    name: ambient-control-plane
    namespace: ambient-code--runtime-int
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: ambient-control-plane-tenant-namespaces
  namespace: ambient-code--config
rules:
  - apiGroups: ["tenant.paas.redhat.com"]
    resources: ["tenantnamespaces"]
    verbs: ["get", "list", "watch", "create", "delete"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: ambient-control-plane-tenant-namespaces
  namespace: ambient-code--config
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: ambient-control-plane-tenant-namespaces
subjects:
  - kind: ServiceAccount
    name: ambient-control-plane
    namespace: ambient-code--runtime-int
