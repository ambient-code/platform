apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

metadata:
  name: ambient-mpp-openshift

namespace: ambient-code--runtime-int

resources:
- ambient-api-server-db.yaml
- ambient-api-server.yaml
- ambient-control-plane.yaml
- ambient-api-server-route.yaml
- ambient-control-plane-sa.yaml
- ambient-control-plane-rbac.yaml
- ambient-tenant-ingress-netpol.yaml

patches:
- path: ambient-api-server-args-patch.yaml
  target:
    group: apps
    kind: Deployment
    name: ambient-api-server
    version: v1
- path: ambient-api-server-service-ca-patch.yaml
  target:
    kind: Service
    name: ambient-api-server
    version: v1

images:
- name: quay.io/ambient_code/vteam_api_server
  newTag: mgt-001
- name: quay.io/ambient_code/vteam_api_server:latest
  newName: quay.io/ambient_code/vteam_api_server
  newTag: mgt-001
- name: quay.io/ambient_code/vteam_control_plane
  newTag: mgt-001
- name: quay.io/ambient_code/vteam_control_plane:latest
  newName: quay.io/ambient_code/vteam_control_plane
  newTag: mgt-001
