apiVersion: apps/v1
kind: Deployment
metadata:
  name: agentic-operator
spec:
  template:
    spec:
      containers:
      - name: agentic-operator
        env:
        - name: AMBIENT_CODE_RUNNER_IMAGE
          value: "image-registry.openshift-image-registry.svc:5000/ambient-code/vteam_claude_runner:latest"
        - name: STATE_SYNC_IMAGE
          value: "image-registry.openshift-image-registry.svc:5000/ambient-code/vteam_state_sync:latest"
        - name: IMAGE_PULL_POLICY
          value: "Always"
