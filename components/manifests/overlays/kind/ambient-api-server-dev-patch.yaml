apiVersion: apps/v1
kind: Deployment
metadata:
  name: ambient-api-server
spec:
  template:
    spec:
      initContainers:
        - name: pre-migration
          image: postgres:16
          imagePullPolicy: IfNotPresent
          command:
            - sh
            - -c
            - |
              until pg_isready -h "$PGHOST" -p "$PGPORT" -U "$PGUSER"; do
                echo "waiting for database..."; sleep 2
              done
              psql -v ON_ERROR_STOP=0 <<'SQL'
              CREATE TABLE IF NOT EXISTS role_bindings (
                id TEXT PRIMARY KEY,
                created_at TIMESTAMPTZ NOT NULL,
                updated_at TIMESTAMPTZ NOT NULL,
                deleted_at TIMESTAMPTZ,
                user_id TEXT NOT NULL,
                role_id TEXT NOT NULL,
                scope TEXT NOT NULL,
                scope_id TEXT
              );
              CREATE INDEX IF NOT EXISTS idx_role_bindings_deleted_at ON role_bindings(deleted_at);
              SQL
              echo "pre-migration complete"
          env:
            - name: PGHOST
              value: ambient-api-server-db
            - name: PGPORT
              value: "5432"
            - name: PGUSER
              value: ambient
            - name: PGPASSWORD
              value: TheBlurstOfTimes
            - name: PGDATABASE
              value: ambient_api_server
          securityContext:
            allowPrivilegeEscalation: false
            runAsNonRoot: true
            runAsUser: 999
            capabilities:
              drop: ["ALL"]
        - name: migration
          imagePullPolicy: IfNotPresent
          command:
            - /usr/local/bin/ambient-api-server
            - migrate
            - --db-host-file=/secrets/db/db.host
            - --db-port-file=/secrets/db/db.port
            - --db-user-file=/secrets/db/db.user
            - --db-password-file=/secrets/db/db.password
            - --db-name-file=/secrets/db/db.name
            - --db-sslmode=disable
            - --alsologtostderr
            - -v=10
      containers:
        - name: api-server
          imagePullPolicy: IfNotPresent
          env:
            - name: AMBIENT_ENV
              value: development
          command:
            - /usr/local/bin/ambient-api-server
            - serve
            - --db-host-file=/secrets/db/db.host
            - --db-port-file=/secrets/db/db.port
            - --db-user-file=/secrets/db/db.user
            - --db-password-file=/secrets/db/db.password
            - --db-name-file=/secrets/db/db.name
            - --enable-jwt=true
            - --enable-authz=false
            - --jwk-cert-file=/configs/authentication/jwks.json
            - --enable-https=false
            - --enable-tls=false
            - --enable-grpc=true
            - --grpc-enable-tls=false
            - --api-server-bindaddress=:8000
            - --metrics-server-bindaddress=:4433
            - --health-check-server-bindaddress=:4434
            - --enable-health-check-https=false
            - --db-sslmode=disable
            - --db-max-open-connections=50
            - --enable-db-debug=false
            - --enable-metrics-https=false
            - --http-read-timeout=5s
            - --http-write-timeout=30s
            - --cors-allowed-origins=*
            - --cors-allowed-headers=X-Ambient-Project
            - --grpc-server-bindaddress=:9000
            - --alsologtostderr
            - -v=10
          volumeMounts:
            - name: db-secrets
              mountPath: /secrets/db
            - name: app-secrets
              mountPath: /secrets/service
            - name: auth-config
              mountPath: /configs/authentication
          livenessProbe:
            httpGet:
              path: /api/ambient
              port: 8000
              scheme: HTTP
            initialDelaySeconds: 15
            periodSeconds: 5
          readinessProbe:
            httpGet:
              path: /healthcheck
              port: 4434
              scheme: HTTP
              httpHeaders:
                - name: User-Agent
                  value: Probe
            initialDelaySeconds: 20
            periodSeconds: 10
      volumes:
        - name: tls-certs
          emptyDir: {}
