name: Jira ↔ GitHub Sync

# Keeps GitHub PRs, GitHub Issues, and Jira in two-way sync.
# Always runs all phases (full sweep).
#
# PHASES:
#   1. Open PR Health Check  - ensure every active PR has a Jira, is In Progress
#   2. Merged PR Audit       - resolve Jira tickets for PRs merged in the last 7 days
#   3. GitHub Issue Sync     - ensure every open GH issue has a Jira ticket
#   4. Sprint Epic Alignment - flag sprint items missing an epic link
#
# REQUIRED SECRETS:
#   CLAUDE_CODE_OAUTH_TOKEN  - Claude Code OAuth token (Jira MCP included)

on:
  schedule:
    - cron: '0 8 * * 1-5'   # Weekdays at 8 AM UTC
  workflow_dispatch:          # Manual trigger

permissions:
  contents: read
  pull-requests: write
  issues: write
  id-token: write

jobs:
  sync:
    name: Jira ↔ GitHub Sync
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run Sync Agent
        uses: anthropics/claude-code-action@v1
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          prompt: |
            You are the Jira ↔ GitHub sync agent for the Ambient Code Platform team.

            Your job is to keep GitHub PRs, GitHub Issues, and Jira in two-way sync.
            Use the Jira MCP tools for all Jira operations and `gh` CLI for GitHub operations.
            Execute each phase carefully and collect results for the final summary.

            ## Constants

            - GitHub repo: ambient-code/platform
            - Jira project: RHOAIENG
            - Jira board ID: 23005
            - Stale threshold: 14 days

            ## Contributor allowlist

            Only process PRs authored by these GitHub users (plus Amber bot PRs — see below):
            mprpic, ktdreyer, adalton, kahowell, jeremyeder, markturansky, jwm4, Gkrumbach07, maskarb

            Amber PRs: authored by the `github-actions` bot with the `amber-generated` label.
            Treat them as normal PRs — same sync rules, no assignee.

            ## Resolving a GitHub author to a Jira assignee

            Never hardcode a username map. For each PR author, resolve their Jira account dynamically:

            1. Fetch the author's email from GitHub:
               ```bash
               GH_EMAIL=$(gh api users/<github_login> --jq '.email // empty')
               ```
               If the email is empty (private profile), try the commits on the PR:
               ```bash
               GH_EMAIL=$(gh api repos/ambient-code/platform/pulls/<pr_num>/commits \
                 --jq '.[0].commit.author.email // empty')
               ```

            2. If an email was found, look up the Jira user:
               ```
               mcp__jira__jira_get_user_profile(user_identifier="<email>")
               ```
               Use the returned account ID or username as the assignee.

            3. If no email found or Jira lookup fails → leave assignee empty, move on.

            ---

            ## PHASE 0 — Setup

            **0.1** Fetch the active sprint ID using the Jira MCP:
            ```
            mcp__jira__jira_get_sprints_from_board(board_id="23005", state="active")
            ```
            Store the sprint ID — you'll need it throughout.

            **0.2** Fetch all valid open PRs using `gh`:
            ```bash
            gh pr list --repo ambient-code/platform --state open --limit 100 \
              --json number,title,author,body,labels,headRefName,updatedAt,isDraft \
              > /tmp/open_prs.json
            ```

            Filter the list in memory:
            - Skip `isDraft: true`
            - Skip author `dependabot[bot]`
            - Keep if author is in the contributor list
            - Keep if author is `github-actions` AND labels include `amber-generated`
            - Discard everything else

            **0.3** Helper — extract Jira key from a string:
            Look for the pattern `RHOAIENG-[0-9]+` in the PR title and body combined.

            **0.4** Helper — stale check:
            A PR is stale if `updatedAt` is more than 14 days before today.

            **0.5** Helper — prepend Jira reference to PR body:
            ```bash
            CURRENT_BODY=$(gh pr view $PR_NUM --repo ambient-code/platform --json body -q '.body')
            NEW_BODY="**Jira:** [RHOAIENG-XXXXX](https://issues.redhat.com/browse/RHOAIENG-XXXXX)

            $CURRENT_BODY"
            gh pr edit $PR_NUM --repo ambient-code/platform --body "$NEW_BODY"
            ```

            **0.6** Helper — prepend Jira reference to GH issue description:
            ```bash
            CURRENT_BODY=$(gh issue view $ISSUE_NUM --repo ambient-code/platform --json body -q '.body')
            NEW_BODY="**Jira:** [RHOAIENG-XXXXX](https://issues.redhat.com/browse/RHOAIENG-XXXXX)

            $CURRENT_BODY"
            gh issue edit $ISSUE_NUM --repo ambient-code/platform --body "$NEW_BODY"
            ```

            ---

            ## PHASE 1 — Open PR Health Check

            For each valid open PR (process one at a time):

            **Step 1.1 — Stale check**
            If the PR hasn't been updated in more than 14 days:
            - Check if the `stale` label already exists
            - If not: `gh pr edit $PR_NUM --repo ambient-code/platform --add-label "stale"`
            - Record as stale and **skip steps 1.2–1.4 for this PR**

            **Step 1.2 — Jira link check**
            Scan the PR title + body for `RHOAIENG-[0-9]+`.
            - Found → store the key, jump to Step 1.4
            - Not found → continue to Step 1.3

            **Step 1.3 — Jira discovery / creation**

            First, search Jira for an existing match:
            ```
            mcp__jira__jira_search(
              jql="project=RHOAIENG AND summary ~ \"<keywords from PR title>\" AND resolution=Unresolved",
              limit=3,
              fields="summary,status,key"
            )
            ```

            If a confident match is found (summary is clearly the same feature/fix):
            - Use that Jira key
            - Prepend to PR body using helper 0.5
            - Add GitHub PR as remote link in Jira:
              ```
              mcp__jira__jira_create_remote_issue_link(
                issue_key="RHOAIENG-XXXXX",
                url="https://github.com/ambient-code/platform/pull/$PR_NUM",
                title="PR #$PR_NUM: $PR_TITLE"
              )
              ```

            If no match found:
            - Determine issue type: `Bug` if PR labels include `bug`, `fix`, or `auto-fix`; else `Task`
            - Determine assignee: empty for Amber PRs; look up Jira username for human PRs
            - Create the Jira issue:
              ```
              mcp__jira__jira_create_issue(
                project_key="RHOAIENG",
                summary="<PR title>",
                issue_type="Task" or "Bug",
                assignee="<jira username or null>",
                components="Agentic",
                description="GitHub PR: https://github.com/ambient-code/platform/pull/$PR_NUM\n\n<PR title>",
                additional_fields={"customfield_12313240": {"value": "Ambient team"}}
              )
              ```
            - Add PR as remote link in the new Jira issue (same call as above)
            - Add the new issue to the active sprint:
              ```
              mcp__jira__jira_update_issue(
                issue_key="RHOAIENG-XXXXX",
                fields={},
                additional_fields={"customfield_10020": {"id": <sprint_id>}}
              )
              ```
            - Prepend Jira key to PR body using helper 0.5

            **Step 1.4 — Status sync**

            Get current Jira status:
            ```
            mcp__jira__jira_get_issue(issue_key="RHOAIENG-XXXXX", fields="status")
            ```

            If status is `New` or `Backlog`:
            ```
            mcp__jira__jira_get_transitions(issue_key="RHOAIENG-XXXXX")
            # find the "In Progress" transition ID
            mcp__jira__jira_transition_issue(issue_key="RHOAIENG-XXXXX", transition_id="<id>")
            ```

            Check if a remote link to this PR already exists — if not, add it:
            ```
            mcp__jira__jira_create_remote_issue_link(
              issue_key="RHOAIENG-XXXXX",
              url="https://github.com/ambient-code/platform/pull/$PR_NUM",
              title="PR #$PR_NUM: $PR_TITLE"
            )
            ```

            Record outcome: synced / jira_created / error.

            ---

            ## PHASE 2 — Merged PR Audit (last 7 days)

            Fetch recently merged PRs:
            ```bash
            gh pr list --repo ambient-code/platform --state merged --limit 50 \
              --json number,title,author,body,mergedAt,mergeCommit \
              > /tmp/merged_prs.json
            ```

            Filter to PRs merged in the last 7 days by contributors or Amber bot.

            For each:

            - Extract Jira key from title + body
            - **Has Jira key:**
              ```
              mcp__jira__jira_get_issue(issue_key="RHOAIENG-XXXXX", fields="status")
              ```
              If not already `Resolved`/`Done`/`Closed`:
              ```
              mcp__jira__jira_transition_issue(issue_key="RHOAIENG-XXXXX", transition_id="<resolved id>")
              mcp__jira__jira_add_comment(
                issue_key="RHOAIENG-XXXXX",
                comment="PR #$PR_NUM merged: https://github.com/ambient-code/platform/pull/$PR_NUM"
              )
              ```
              Record as resolved.

            - **No Jira key:** Record as missed (no action, note in summary only).

            ---

            ## PHASE 3 — GitHub Issue Sync

            Fetch all open GitHub issues:
            ```bash
            gh issue list --repo ambient-code/platform --state open --limit 200 \
              --json number,title,body,author,labels,createdAt \
              > /tmp/gh_issues.json
            ```

            For each open issue:

            **Step 3.1** Scan body for `RHOAIENG-[0-9]+`. If found → skip (already tracked).

            **Step 3.2** Search Jira for a match:
            ```
            mcp__jira__jira_search(
              jql="project=RHOAIENG AND summary ~ \"<issue title keywords>\" AND resolution=Unresolved",
              limit=3
            )
            ```

            - Match found:
              - Prepend Jira key to GH issue description (helper 0.6)
              - Add GH issue as remote link in Jira:
                ```
                mcp__jira__jira_create_remote_issue_link(
                  issue_key="RHOAIENG-XXXXX",
                  url="https://github.com/ambient-code/platform/issues/$ISSUE_NUM",
                  title="GH Issue #$ISSUE_NUM: $ISSUE_TITLE"
                )
                ```

            - No match:
              - Create Jira issue (type: Task, no assignee):
                ```
                mcp__jira__jira_create_issue(
                  project_key="RHOAIENG",
                  summary="<issue title>",
                  issue_type="Task",
                  components="Agentic",
                  description="GitHub Issue: https://github.com/ambient-code/platform/issues/$ISSUE_NUM",
                  additional_fields={"customfield_12313240": {"value": "Ambient team"}}
                )
                ```
              - Add GH issue as remote link in new Jira issue
              - Prepend Jira key to GH issue description (helper 0.6)

            Record outcome: skipped / linked / created.

            ---

            ## PHASE 4 — Sprint Epic Alignment

            Fetch all issues in the active sprint:
            ```
            mcp__jira__jira_get_sprint_issues(sprint_id="<active_sprint_id>", limit=50)
            ```

            For each sprint issue that has **no epic link** (check `customfield_10014` or parent):

            Fetch the team's open epics:
            ```
            mcp__jira__jira_search(
              jql="project=RHOAIENG AND issuetype=Epic AND resolution=Unresolved AND (labels=ambient-capability OR labels=ambient OR summary ~ \"Ambient\" OR summary ~ \"Epic:\")",
              limit=50,
              fields="summary,key,labels"
            )
            ```

            Do a keyword comparison between the sprint issue summary and each epic summary.
            If there is a confident match (same theme — e.g. "MCP" matches "Epic: Custom Workflows & Extensibility"):
            ```
            mcp__jira__jira_link_to_epic(issue_key="RHOAIENG-XXXXX", epic_key="RHOAIENG-YYYYY")
            ```

            If no confident match → add to outliers list.

            ---

            ## FINAL — Summary Report

            Create a single GitHub issue summarizing the run. Only create it if at least one action was taken or there are outliers. If everything was already in sync, print a one-line log to stdout and exit.

            ```bash
            gh issue create \
              --repo ambient-code/platform \
              --title "[Jira Sync] $(date -u +%Y-%m-%d)" \
              --label "jira-sync" \
              --body "## Jira ↔ GitHub Sync — $(date -u +%Y-%m-%d)


            ### Phase 1 — Open PRs
            - ✅ Already in sync: N
            - 🆕 Jira created: N (list keys)
            - 🔗 Jira linked: N (list keys)
            - 🟡 Marked stale: N (list PR numbers)
            - ❌ Errors: N

            ### Phase 2 — Merged PRs
            - ✅ Resolved in Jira: N (list keys)
            - ⚠️ Merged with no Jira: N — PRs: #N, #N

            ### Phase 3 — GitHub Issues
            - ✅ Already tracked: N
            - 🔗 Linked to existing Jira: N
            - 🆕 Jira created: N

            ### Phase 4 — Sprint Epic Alignment
            - ✅ Linked to epic: N
            - 🚩 Outliers (need human triage): N

            #### Sprint items with no epic match
            | Key | Summary | Status |
            |-----|---------|--------|
            | RHOAIENG-XXXXX | ... | In Progress |
            "
            ```

            ## Error handling

            - If any single item fails, log the error, note it in the summary, and continue.
            - Never abort the entire run for one failure.
            - If the active sprint cannot be determined, skip sprint-related steps but continue all others.
