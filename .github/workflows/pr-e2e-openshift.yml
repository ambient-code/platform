name: PR E2E on OpenShift

on:
  workflow_run:
    workflows: ["Build and Push Component Docker Images"]
    types: [completed]

concurrency:
  group: pr-e2e-openshift-${{ github.event.workflow_run.pull_requests[0].number }}
  cancel-in-progress: true

jobs:
  setup:
    if: >
      github.event.workflow_run.event == 'pull_request' &&
      github.event.workflow_run.conclusion == 'success' &&
      github.event.workflow_run.pull_requests[0] != null
    runs-on: ubuntu-latest
    outputs:
      pr_number: ${{ steps.ctx.outputs.pr_number }}
      instance_id: ${{ steps.ctx.outputs.instance_id }}
      namespace: ${{ steps.ctx.outputs.namespace }}
      image_tag: ${{ steps.ctx.outputs.image_tag }}
    steps:
      - name: Derive PR context
        id: ctx
        run: |
          PR_NUMBER="${{ github.event.workflow_run.pull_requests[0].number }}"
          HEAD_BRANCH="${{ github.event.workflow_run.head_branch }}"

          BRANCH_SLUG=$(echo "$HEAD_BRANCH" \
            | tr '[:upper:]' '[:lower:]' \
            | sed 's/[^a-z0-9]/-/g' \
            | sed 's/-\+/-/g' \
            | sed 's/^-\|-$//g')

          INSTANCE_ID="pr-${PR_NUMBER}-${BRANCH_SLUG:0:45}"
          NAMESPACE="ambient-code--${INSTANCE_ID}"
          IMAGE_TAG="pr-${PR_NUMBER}-amd64"

          echo "pr_number=$PR_NUMBER"   >> $GITHUB_OUTPUT
          echo "instance_id=$INSTANCE_ID" >> $GITHUB_OUTPUT
          echo "namespace=$NAMESPACE"   >> $GITHUB_OUTPUT
          echo "image_tag=$IMAGE_TAG"   >> $GITHUB_OUTPUT

          echo "PR:        $PR_NUMBER"
          echo "Instance:  $INSTANCE_ID"
          echo "Namespace: $NAMESPACE"
          echo "Image tag: $IMAGE_TAG"

  provision:
    needs: setup
    runs-on: ubuntu-latest
    outputs:
      namespace: ${{ needs.setup.outputs.namespace }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event.workflow_run.head_sha }}

      - name: Install oc
        uses: redhat-actions/oc-installer@v1
        with:
          oc_version: 'latest'

      - name: Log in to OpenShift
        run: |
          oc login ${{ secrets.TEST_OPENSHIFT_SERVER }} \
            --token=${{ secrets.TEST_OPENSHIFT_TOKEN }} \
            --insecure-skip-tls-verify

      - name: Provision namespace
        run: |
          bash components/pr-test/provision.sh create \
            "${{ needs.setup.outputs.instance_id }}"

  install:
    needs: [setup, provision]
    runs-on: ubuntu-latest
    outputs:
      frontend_url: ${{ steps.install.outputs.frontend_url }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event.workflow_run.head_sha }}

      - name: Install oc
        uses: redhat-actions/oc-installer@v1
        with:
          oc_version: 'latest'

      - name: Install kustomize
        run: |
          curl -s "https://raw.githubusercontent.com/kubernetes-sigs/kustomize/master/hack/install_kustomize.sh" | bash
          sudo mv kustomize /usr/local/bin/

      - name: Log in to OpenShift
        run: |
          oc login ${{ secrets.TEST_OPENSHIFT_SERVER }} \
            --token=${{ secrets.TEST_OPENSHIFT_TOKEN }} \
            --insecure-skip-tls-verify

      - name: Log in to Quay.io
        uses: docker/login-action@v3
        with:
          registry: quay.io
          username: ${{ secrets.QUAY_USERNAME }}
          password: ${{ secrets.QUAY_PASSWORD }}

      - name: Install Ambient
        id: install
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          bash components/pr-test/install.sh \
            "${{ needs.setup.outputs.namespace }}" \
            "${{ needs.setup.outputs.image_tag }}"

  e2e:
    needs: [setup, install]
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event.workflow_run.head_sha }}

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: e2e/package-lock.json

      - name: Install e2e dependencies
        run: cd e2e && npm ci

      - name: Run Cypress E2E tests
        env:
          CYPRESS_BASE_URL: ${{ needs.install.outputs.frontend_url }}
          CYPRESS_ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          cd e2e
          npx cypress run --browser chrome

      - name: Upload screenshots on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: cypress-screenshots-pr-${{ needs.setup.outputs.pr_number }}
          path: e2e/cypress/screenshots
          if-no-files-found: ignore

      - name: Upload videos on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: cypress-videos-pr-${{ needs.setup.outputs.pr_number }}
          path: e2e/cypress/videos
          if-no-files-found: ignore

  teardown:
    needs: [setup, provision, e2e]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Install oc
        uses: redhat-actions/oc-installer@v1
        with:
          oc_version: 'latest'

      - name: Log in to OpenShift
        run: |
          oc login ${{ secrets.TEST_OPENSHIFT_SERVER }} \
            --token=${{ secrets.TEST_OPENSHIFT_TOKEN }} \
            --insecure-skip-tls-verify

      - name: Destroy namespace
        run: |
          bash components/pr-test/provision.sh destroy \
            "${{ needs.setup.outputs.instance_id }}"
