# Amber Handler
#
# Single workflow for all Amber AI automation.
#
# TRIGGERS:
# - Issue labeled with: amber:auto-fix
# - Comment containing @amber on an issue or PR (members/owners/collaborators only)
# - Cron: every 30 min weekdays (batch PR management)
# - Manual dispatch (batch PR management)
#
# BEHAVIOR:
# - On an issue (label or @amber): creates ACP session to investigate and fix, creates PR with amber:managed + frontmatter
# - On a PR (@amber): creates ACP session to follow instruction or fix CI/conflicts/reviews
# - Batch cron: orchestrator manages all amber:managed PRs (session reuse, change detection, circuit breaker)

name: Amber Handler

on:
  issues:
    types: [labeled]
  issue_comment:
    types: [created]
  schedule:
    - cron: '*/30 * * * 1-5'
  workflow_dispatch:

permissions:
  contents: read
  issues: write
  pull-requests: write

jobs:
  # -- Issue: labeled amber:auto-fix --
  handle-issue-label:
    if: >-
      github.event_name == 'issues'
      && github.event.label.name == 'amber:auto-fix'
    concurrency:
      group: amber-issue-${{ github.event.issue.number }}
      cancel-in-progress: false
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Resolve issue details
        id: issue
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          NUMBER="${{ github.event.issue.number }}"
          TITLE=$(gh issue view "$NUMBER" --repo "${{ github.repository }}" --json title --jq '.title')
          echo "number=$NUMBER" >> $GITHUB_OUTPUT
          echo "title=$TITLE" >> $GITHUB_OUTPUT

      - name: Check for existing PR
        id: existing
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          NUMBER="${{ steps.issue.outputs.number }}"
          EXISTING=$(gh pr list --repo "${{ github.repository }}" --state open --label "amber:managed" --json number,body --jq ".[] | select(.body | test(\"source=.*#${NUMBER}\")) | .number" | head -1 || echo "")
          if [ -n "$EXISTING" ]; then
            echo "Found existing amber:managed PR #$EXISTING for issue #$NUMBER — skipping"
            echo "skip=true" >> $GITHUB_OUTPUT
          else
            echo "skip=false" >> $GITHUB_OUTPUT
          fi

      - name: Create session
        if: steps.existing.outputs.skip != 'true'
        id: session
        uses: ambient-code/ambient-action@v0.0.3
        with:
          api-url: ${{ secrets.AMBIENT_API_URL }}
          api-token: ${{ secrets.AMBIENT_BOT_TOKEN }}
          project: ${{ secrets.AMBIENT_PROJECT }}
          prompt: |
            You are investigating and fixing a GitHub issue.

            Source: #${{ steps.issue.outputs.number }} — ${{ steps.issue.outputs.title }}
            URL: https://github.com/${{ github.repository }}/issues/${{ steps.issue.outputs.number }}

            ## Instructions

            1. Read the issue and understand the problem.
            2. Explore the codebase to find the relevant code.
            3. Implement a fix. Write tests if the area has existing test coverage.
            4. Create a PR with a clear description. Include this frontmatter as the
               first line of the PR body (read your session ID from the
               AGENTIC_SESSION_NAME environment variable):
               <!-- acp:session_id=$AGENTIC_SESSION_NAME source=#${{ steps.issue.outputs.number }} last_action=<ISO8601_NOW> retry_count=0 -->
            5. Add the `amber:managed` label to the PR.
            6. Ensure CI passes. If it fails, investigate and fix.
            7. Do not merge. Leave the PR open for human review.
          repos: >-
            [{"url": "https://github.com/${{ github.repository }}", "branch": "main"}]
          model: claude-opus-4-6
          wait: 'true'
          timeout: '60'

      - name: Post-session labels and comment
        if: steps.existing.outputs.skip != 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SESSION_NAME: ${{ steps.session.outputs.session-name }}
          SESSION_PHASE: ${{ steps.session.outputs.session-phase }}
        run: |
          gh issue edit ${{ steps.issue.outputs.number }} --repo "${{ github.repository }}" --add-label "amber:triaged" || true
          if [ -n "$SESSION_NAME" ]; then
            gh issue comment ${{ steps.issue.outputs.number }} --repo "${{ github.repository }}" --body "Session \`$SESSION_NAME\` created (phase: $SESSION_PHASE). PR will have the \`amber:managed\` label."
          fi

      - name: Session summary
        if: always() && steps.existing.outputs.skip != 'true'
        env:
          SESSION_NAME: ${{ steps.session.outputs.session-name }}
          SESSION_UID: ${{ steps.session.outputs.session-uid }}
          SESSION_PHASE: ${{ steps.session.outputs.session-phase }}
        run: |
          echo "### Amber — Issue #${{ steps.issue.outputs.number }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          if [ -n "$SESSION_NAME" ]; then
            echo "- **Session**: \`$SESSION_NAME\`" >> $GITHUB_STEP_SUMMARY
            echo "- **Phase**: \`$SESSION_PHASE\`" >> $GITHUB_STEP_SUMMARY
          else
            echo "- **Status**: Failed to create session" >> $GITHUB_STEP_SUMMARY
          fi

  # -- @amber comment on an issue or PR --
  handle-comment:
    if: >-
      github.event_name == 'issue_comment'
      && contains(github.event.comment.body, '@amber')
      && (github.event.comment.author_association == 'MEMBER'
          || github.event.comment.author_association == 'OWNER'
          || github.event.comment.author_association == 'COLLABORATOR')
    concurrency:
      group: amber-${{ github.event.issue.number }}
      cancel-in-progress: false
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Resolve context
        id: context
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          NUMBER="${{ github.event.issue.number }}"
          echo "number=$NUMBER" >> $GITHUB_OUTPUT

          if [ -n "${{ github.event.issue.pull_request }}" ]; then
            echo "type=pr" >> $GITHUB_OUTPUT
            echo "url=https://github.com/${{ github.repository }}/pull/$NUMBER" >> $GITHUB_OUTPUT

            IS_FORK=$(gh pr view "$NUMBER" --repo "${{ github.repository }}" --json isCrossRepository --jq '.isCrossRepository')
            echo "is_fork=$IS_FORK" >> $GITHUB_OUTPUT
          else
            echo "type=issue" >> $GITHUB_OUTPUT
            echo "url=https://github.com/${{ github.repository }}/issues/$NUMBER" >> $GITHUB_OUTPUT
            echo "is_fork=false" >> $GITHUB_OUTPUT
          fi

      - name: Create session
        if: steps.context.outputs.is_fork != 'true'
        id: session
        uses: ambient-code/ambient-action@v0.0.3
        with:
          api-url: ${{ secrets.AMBIENT_API_URL }}
          api-token: ${{ secrets.AMBIENT_BOT_TOKEN }}
          project: ${{ secrets.AMBIENT_PROJECT }}
          prompt: |
            Context: ${{ steps.context.outputs.type }} #${{ steps.context.outputs.number }}
            URL: ${{ steps.context.outputs.url }}

            ${{ github.event.comment.body }}
          repos: >-
            [{"url": "https://github.com/${{ github.repository }}", "branch": "main"}]
          model: claude-opus-4-6
          wait: 'true'
          timeout: '60'

      - name: Session summary
        if: always() && steps.context.outputs.is_fork != 'true'
        env:
          SESSION_NAME: ${{ steps.session.outputs.session-name }}
          SESSION_PHASE: ${{ steps.session.outputs.session-phase }}
        run: |
          echo "### Amber — ${{ steps.context.outputs.type }} #${{ steps.context.outputs.number }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          if [ -n "$SESSION_NAME" ]; then
            echo "- **Session**: \`$SESSION_NAME\`" >> $GITHUB_STEP_SUMMARY
            echo "- **Phase**: \`$SESSION_PHASE\`" >> $GITHUB_STEP_SUMMARY
          else
            echo "- **Status**: Failed to create session" >> $GITHUB_STEP_SUMMARY
          fi

  # -- Batch: manage all amber:managed PRs --
  batch-pr-fixer:
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
    concurrency:
      group: amber-batch
      cancel-in-progress: false
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - name: Run PR fixer orchestrator
        id: session
        uses: ambient-code/ambient-action@v0.0.3
        with:
          api-url: ${{ secrets.AMBIENT_API_URL }}
          api-token: ${{ secrets.AMBIENT_BOT_TOKEN }}
          project: ${{ secrets.AMBIENT_PROJECT }}
          prompt: |
            You are a PR fixer orchestrator. Manage all open amber:managed PRs.

            ## Find PRs

            Run: gh pr list --repo ${{ github.repository }} --state open --label "amber:managed" --search "draft:false" --limit 200

            For each PR:

            ## 1. Read frontmatter
            Parse <!-- acp:session_id=<ID> source=<KEY> last_action=<TIMESTAMP> retry_count=<N> --> from the PR body.
            If no frontmatter: create a new Fix PR session, update the PR body with frontmatter. Continue.

            ## 2. Circuit breaker
            If retry_count >= 3: comment "AI was unable to resolve after 3 attempts. Needs human attention.",
            add amber:needs-human label, remove amber:managed label. Skip.

            ## 3. Check for changes since last_action
            Ignore commits authored by the bot. Only look for:
            - New commits by someone other than the bot
            - New or updated review comments
            - New CI failures
            - Merge conflicts from base branch changes

            If nothing changed → skip entirely.

            ## 4. Something changed — act
            - CI failing → send message to existing session with CI logs
            - New review comments → send message with the comments
            - Merge conflicts → send message to rebase
            - New external commits → send message to review and ensure CI passes

            ## 5. Session management
            Before sending a message, check session status:
            - Running → send the message
            - Stopped → restart (reuse), then send
            - Not found → create new session with this prompt:
              "You are maintaining an open pull request.
              PR: <URL>  Source issue: <KEY> (if known)
              1. Check out the PR branch.
              2. Resolve merge conflicts, fix CI failures, address review comments.
              3. Push fixes. Do not merge/close/force-push.
              4. Write frontmatter: <!-- acp:session_id=$AGENTIC_SESSION_NAME source=<KEY> last_action=<NOW> retry_count=0 -->
              5. If broken beyond repair, comment and stop."

            After sending:
            - If the PR is still broken (CI failing, conflicts unresolved, reviews unaddressed), increment retry_count.
            - If the PR is healthy (CI passing, no open review threads, no conflicts), reset retry_count to 0.
            - Update last_action in frontmatter.

            ## Rules
            - No-op if nothing changed. Do not interact with the session.
            - Use real ACP session IDs from AGENTIC_SESSION_NAME env var.
            - Send messages to existing sessions, don't recreate.
            - Ignore bot's own commits.
            - Do not merge PRs.

            All child sessions use model claude-opus-4-6.
          repos: >-
            [{"url": "https://github.com/${{ github.repository }}", "branch": "main"}]
          model: claude-opus-4-6
          wait: 'true'
          timeout: '60'

      - name: Session summary
        if: always()
        env:
          SESSION_NAME: ${{ steps.session.outputs.session-name }}
          SESSION_UID: ${{ steps.session.outputs.session-uid }}
          SESSION_PHASE: ${{ steps.session.outputs.session-phase }}
        run: |
          echo "### Amber — Batch PR Fixer" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          if [ -n "$SESSION_NAME" ]; then
            echo "- **Session**: \`$SESSION_NAME\`" >> $GITHUB_STEP_SUMMARY
            echo "- **Phase**: \`$SESSION_PHASE\`" >> $GITHUB_STEP_SUMMARY
          else
            echo "- **Status**: Failed to create session" >> $GITHUB_STEP_SUMMARY
          fi
